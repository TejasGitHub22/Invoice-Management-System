<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
 <style>
        a{
            text-decoration:none;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2">
            <ul class="list-group">
                <li class="list-group-item"><a href="#">Dashboard</a></li>
                <li class="list-group-item"><a href="AllInvoices.html">Invoices</a></li>
                <li class="list-group-item"><a href="Customer.html">Customer</a></li>
                <li class="list-group-item"><a href="Product.html">Product</a></li>
                <li class="list-group-item"><a href="NewInvoice.html">NewInvoice</a></li>

            </ul>
        </div>
        <div class="col-md-10" style="padding-top: 2%;">
               <div class="row">
                <table class="table table-borderless">
                    <tr>
                        <td style="text-align:right;">
                            <label>Invoice Date:</label>

                        </td>
                        <td><input type="date" id="txtdate" class="form-control"></td>
                         <td  style="text-align:right;">
                            <label>Customer Name:</label>

                        </td>
                        <td>
                            <select id="ddcustomer">
                                <option selected disabled>Select Customer</option>
                            </select>
                        </td>
                    </tr>
                    </table>

                    <hr/>
                    <table class="table  table-borderless">
                        <tr>
                            <td>
                                <label>Product</label>
                                <select id="ddproduct" class="form-control" onchange="GetProductById()">
                                    <option selected disabled>Select Product</option>
                                </select>
                            </td>
                             <td>
                                <label>Rate</label>
                               <input type="text" id="txtrate" class="form-control" style="width: 100px;" disabled>
                            </td>
                               <td>
                                <label>Gst</label>
                               <input type="text" id="txtgst" class="form-control" style="width: 100px;" disabled>
                            </td>
                               <td>
                                <label>Stock</label>
                               <input type="text" id="txtstock" class="form-control" style="width: 100px;" disabled>
                            </td>
                               <td>
                                <label>Quantity</label>
                               <input type="text" id="txtquantity" class="form-control" style="width: 120px;" onkeyup="Calculate()">
                            </td>
                               <td>
                                <label>Total</label>
                               <input type="text" id="txttotal" class="form-control" style="width: 120px;" disabled>
                            </td>
                               <td>
                                <br/>
                               <input type="button" value="+" class="btn btn-primary" onclick="AddProduct()">
                            </td>
                        </tr>
                    </table>
                    <hr/>
                    <div class="col-md-12">
                        <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Sr No</th>
                                <th>Product Name</th>
                                <th>Rate</th>
                                <th>Gst</th>
                                <th>Quantity</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="tbldata">

                        </tbody>
                        <tfoot>
                            <tr>
                                <td colspan="5" style="text-align:right;"> Total= </td>
                                <td><b id="finalamount"></b></td>
                            </tr>
                        </tfoot>
                    </table>
                    </div>

                    <div class="col-md-8">
                    <input type="button" value="Submit" class="btn btn-primary" onclick="SubmitData()">

                    </div>
                </div>
               </div>
        </div>
    </div>
</div>
</body>
<script>
    var product_name="";
    var total=0;
    products=[];
    const GetCustomers=async()=>{
        const response=await fetch("http://localhost:9001/api/customer");
        const customer=await response.json();
        console.log(customer)
        var data="<option selected disabled>Select Customer</option>";
        customer.forEach(function(d,k){
            data+="<option value="+d.customer_id+">"+d.customer_name+"</option>"
        })
        document.getElementById("ddcustomer").innerHTML=data;

    }

    const GetProducts=async()=>{
        const response=await fetch("http://localhost:9001/api/product");
        const products=await response.json();
        console.log(products)
        var data="<option selected disabled>Select Product</option>";
        products.forEach(function(d,k){
            data+="<option value="+d.product_id+">"+d.product_name+"</option>"
        })
        document.getElementById("ddproduct").innerHTML=data;

    }
    GetCustomers();
    GetProducts();

    const GetProductById=async()=>{
        var pid=document.getElementById("ddproduct").value;
        // alert(pid);
        const response=await fetch("http://localhost:9001/api/product/"+pid);
        const pr=await response.json();
        console.log(pr)
        product_name=pr.product_name;
        document.getElementById("txtrate").value=pr.product_rate;
        document.getElementById("txtgst").value=pr.product_gst;
        document.getElementById("txtstock").value=pr.product_stock;
   
   }

   const Calculate=()=>{
    var rate=Number(document.getElementById("txtrate").value);
    var gst=Number(document.getElementById("txtgst").value);
    var qty=Number(document.getElementById("txtquantity").value);

    var total=((rate+(rate*gst/100))*qty).toFixed(2);
    document.getElementById("txttotal").value=total;
   }


   const AddProduct=()=>{

        var pid=Number(document.getElementById("ddproduct").value);
        var rate=Number(document.getElementById("txtrate").value);
        var gst=Number(document.getElementById("txtgst").value);
        var qty=Number(document.getElementById("txtquantity").value);
        var total=Number(document.getElementById("txttotal").value);
    var st={
        "product_name":product_name,
        "product":{"product_id":pid},
        "gst":gst,
        "rate":rate,
        "quantity":qty,
        "total":total
    };

    products.push(st);
    ClearData();
    DisplayTable();
    }

    const DisplayTable=()=>{
        var data="";
        total=0;
        products.forEach(function(d,k){
            total+=Number(d.total);
            data+="<tr><td>"+(k+1)+"</td><td>"+d.product_name+"</td><td>"+d.rate+"</td><td>"+d.gst+"</td><td>"+d.quantity+"</td><td>"+d.total+"</td></tr>"
        })
        document.getElementById("tbldata").innerHTML=data;
        document.getElementById("finalamount").innerHTML=total;
    }

    const SubmitData=async()=>{
        var st={
           "customer":{"customer_id":document.getElementById("ddcustomer").value},
            "total_amount":total,
            "invoice_date":document.getElementById("txtdate").value,
           "invoiceprdt":products
        };
        console.log(st)
        const response=await fetch("http://localhost:9001/api/newinvoice",{
            method:'post',
            body:JSON.stringify(st),
            headers:{
                'content-type':'application/json'
            }
        });
        const invoice=await response.json();
        alert("Invoice generated successfully");
    }
    const ClearData=()=>{
       document.getElementById("txtquantity").value="";
       document.getElementById("txttotal").value="";
    }
</script>
</html>
