<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
 <style>
        a{
            text-decoration:none;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2">
            <ul class="list-group">
                <li class="list-group-item"><a href="#">Dashboard</a></li>
                <li class="list-group-item"><a href="AllInvoices.html">Invoices</a></li>
                <li class="list-group-item"><a href="Customer.html">Customer</a></li>
                <li class="list-group-item"><a href="Product.html">Product</a></li>
                 <li class="list-group-item"><a href="NewInvoice.html">NewInvoice</a></li>
            </ul>
        </div>
        <div class="col-md-10">
                <table>
            
            <tr>
            <td>CustomerID:</td>
            <td> <input type="text" id="customer_id"> </td>
            </tr>

            <tr>
            <td>CustomerName:</td>
            <td> <input type="text" id="customer_name"> </td>
            </tr>

            <tr>
            <td>Gender:</td>
            <td><input type="radio" name="gender" value="MALE"> Male</td>
            <td><input type="radio" name="gender" value="FEMALE"> Female</td>
            </tr>

            <tr>
            <td>BirthDate:</td>
            <td> <input type="date" id="birth_date"> </td>
            </tr>

            <tr>
            <td>Email:</td>
            <td> <input type="text" id="email_address"> </td>
            </tr>

            <tr>
            <td>Mobile:</td>
            <td> <input type="text" id="mobile_number"> </td>
            </tr>
            
            <tr>
            <td>City:</td>
            <td> <input type="text" id="city"> </td>
            </tr>

            
    </table>

            <tr>
               <td> <input type="button" value="Submit" onclick="Add()" id="btnsubmit"></td>
            </tr>

            <hr>

        <table border="1">
        <thead>
            <tr>
                <th>CustomerID</th>
                <th>Customer Name</th>
                <th>Gender</th>
                <th>BirthDate</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>City</th>
            </tr>
            
        </thead>
        
        <tbody id="tbldata"></tbody>
    </table>
        </div>
    </div>
</div>

        
</body>
<script>
    const FetchCustomers=async()=>{
            const repsonse=await fetch("http://localhost:9001/api/customer")
            const customers=await repsonse.json();
            console.log(customers);
            var data="";
            customers.forEach(function(d,k){
                 data+="<tr><td>"+(k+1)+"</td><td>"+d.customer_name+"</td><td>"+d.gender+"</td><td>"+d.birth_date+"</td><td>"+d.email_address+"</td><td>"+d.mobile_number+"</td><td>"+d.city+"</td></tr>";
            })
            document.getElementById("tbldata").innerHTML=data;
        }
        FetchCustomers();

        const Add=async()=>{

            var n=document.getElementById("customer_name").value;
            var g = document.querySelector('input[name="gender"]:checked')?.value || "";
            var b=document.getElementById("birth_date").value;
            var a=document.getElementById("email_address").value;
            var m=document.getElementById("mobile_number").value;
            var c=document.getElementById("city").value;

            var cu={
                "customer_name":n,
                "gender":g,
                "birth_date":b,
                "email_address":a,
                "mobile_number":m,
                "city":c
            };

            const response= await fetch("http://localhost:9001/api/customer",{
                method:"post",
                body:JSON.stringify(cu),
                headers:{
                    'content-type':'application/json'
                }

            });
            

            const stud=await response.text();
            alert("Customer Added Successfully");
            FetchCustomers();
        }
        
</script>
</html>
